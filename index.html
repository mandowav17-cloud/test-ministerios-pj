<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Descubre tus dones</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="contenedor">

    <!-- INICIO -->
    <div id="inicio">
        <h1>✨ Descubre tus dones para servir</h1>
        <p>Un pequeño test para ayudarte a reconocer cómo puedes servir mejor dentro de la comunidad.</p>
        <button onclick="iniciarTest()">Comenzar</button>
    </div>

    <!-- TEST -->
    <div id="test" style="display:none;">
        <h2 id="pregunta"></h2>
        <div id="opciones"></div>
        <button onclick="siguientePregunta()">Siguiente</button>
    </div>

    <!-- CARGA -->
    <div id="cargando" style="display:none; text-align:center;">
        <h2>✨ Analizando tus dones...</h2>
        <p>Conectando con tu propósito...</p>
    </div>

    <!-- RESULTADO -->
    <div id="resultado" style="display:none;">
        <h2 id="arquetipoTitulo"></h2>
        <p id="fraseArquetipo"></p>
        <p id="descripcionArquetipo"></p>

        <h3>Ministerio principal:</h3>
        <p id="ministerioResultado"></p>

        <h3>Inspiración espiritual:</h3>
        <p id="santoResultado"></p>

        <h3>Símbolo:</h3>
        <p id="simboloResultado"></p>

        <h3>Segunda afinidad:</h3>
        <p id="segundoLugar"></p>

        <h3>Tercera afinidad:</h3>
        <p id="tercerLugar"></p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
