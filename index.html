<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PJ Wrapped</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>

<body>

<div class="contenedor">

<!-- INICIO -->
<section id="inicio">
    <img src="logo-pj.png" class="logo" alt="PJ Logo">

    <h1>PJ Wrapped</h1>
    <p>Descubre cómo sirves dentro de la comunidad</p>

    <button onclick="iniciarTest()">Comenzar</button>
</section>

<!-- TEST -->
<section id="test" style="display:none;">
    <h2 id="pregunta"></h2>
    <div id="opciones"></div>
    <button onclick="siguientePregunta()">Siguiente</button>
</section>

<!-- CARGA -->
<section id="cargando" style="display:none; text-align:center;">
    <h2>Analizando tu llamado...</h2>
    <p>Procesando tu perfil espiritual...</p>
</section>

<!-- RESULTADO -->
<section id="resultado" style="display:none;" class="wrap">

    <div class="card" id="wrappedCard">
        <h3>Personaliza tu Wrapped</h3>

<div class="selector-colores">

<div class="color-btn morado"
onclick="cambiarColor('#7b2ff7')"></div>

<div class="color-btn azul"
onclick="cambiarColor('#3a7bd5')"></div>

<div class="color-btn verde"
onclick="cambiarColor('#4cd137')"></div>

<div class="color-btn rojo"
onclick="cambiarColor('#e84118')"></div>

<div class="color-btn dorado"
onclick="cambiarColor('#fbc531')"></div>

</div>

        <p class="wrapped-label">✨ PJ WRAPPED ✨</p>

        <h2 id="arquetipoTitulo"></h2>

        <div id="simboloGrande"></div>

        <p id="fraseArquetipo"></p>

        <div class="box">
            <p id="ministerioResultado"></p>
            <p id="santoResultado"></p>
            <p id="simboloResultado"></p>
        </div>

        <h3>Tu huella secundaria</h3>
        <p id="segundoLugar"></p>
        <p id="tercerLugar"></p>

        <button onclick="copiarResultado()">Copiar resultado</button>
        <button onclick="compartirImagen()">Descargar Wrapped</button>

        <p class="wrapped-tag">#PJWrapped #MiLugarEnLaMision</p>

    </div>

</section>

</div>

<script src="script.js"></script>
</body>
</html>
